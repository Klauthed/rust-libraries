# cargo-release configuration.
#
# All `klauthed-*` crates share one version (`shared-version`). The release flow
# (see CONTRIBUTING.md) uses `cargo release version <level> --execute` to bump
# every crate + the workspace dependency entries together; the maintainer then
# commits, tags `vX.Y.Z`, and pushes. Publishing is owned solely by the `release`
# CI workflow (triggered by the tag) — `publish = false` keeps cargo-release from
# ever publishing locally, even if the full `cargo release` flow is used.
shared-version = true
publish = false
tag-name = "v{{version}}"
pre-release-commit-message = "release: v{{version}}"
