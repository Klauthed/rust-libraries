[package]
name = "klauthed-web"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[features]
# Install the per-request RequestContext as the ambient context (core's
# `task-local`) for the duration of each request's handler future.
context-scope = ["klauthed-core/task-local"]

[dependencies]
klauthed-error.workspace = true
klauthed-core.workspace = true
klauthed-data.workspace = true
klauthed-security.workspace = true
klauthed-platform.workspace = true

actix-web.workspace = true
actix-cors.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
async-trait.workspace = true
futures-util.workspace = true

[dev-dependencies]
serde_json.workspace = true
chrono.workspace = true
