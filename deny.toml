# cargo-deny configuration — supply-chain gates for the klauthed workspace.
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# Run locally with `cargo deny check`; CI runs it on every push/PR.

[graph]
# Check the dependency graph for all targets (don't prune by host platform), so
# CI on Linux still vets Windows/macOS-only deps (e.g. mongodb's BSON stack).
all-features = true

[advisories]
version = 2
# Fail on RustSec advisories (vulnerabilities + unmaintained crates). This is the
# cargo-audit equivalent, sourced from the same advisory database. No ignores: the
# tree is clean (the old rustls 0.21 chain was dropped with MSSQL/tiberius).
ignore = []

[licenses]
version = 2
# Permissive licenses present in the dependency tree. Each crate's SPDX
# expression must resolve to an allowed set; copyleft (LGPL/GPL) is only ever
# reached via `OR` with a permissive option, so it is never selected.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate transitive versions and wildcards are hygiene signals, not security
# failures — warn so CI stays green while still surfacing them in the log.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io (and explicitly allowed git sources) are permitted.
unknown-registry = "deny"
unknown-git = "deny"
