version: 2
updates:
  # Rust dependencies (single root Cargo.lock for the workspace).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
