name: Fuzz

# Coverage-guided fuzzing of the untrusted-input parsers. Runs on nightly (the
# main CI stays on stable), so it lives in its own scheduled workflow rather than
# gating every PR. Trigger manually via the Actions tab when touching a parser.
on:
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    # Bound the whole job: the fuzz step is time-boxed (-max_total_time), but the
    # setup steps (apt, rustup) are not — cap them so a stuck runner can't hang
    # for GitHub's 6h default.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          [jwt_decode, aead_decrypt, oauth2_token_response, config_tree, jwks, oidc, scim]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Install nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup target add x86_64-unknown-linux-gnu --toolchain nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Time-boxed so the job terminates: libFuzzer exits non-zero (failing the
      # job) the moment it finds a panic or sanitizer error.
      #
      # `--target` is pinned to gnu: the prebuilt cargo-fuzz is a musl-static
      # binary, so its default target is musl — where ASan can't link against
      # the statically linked libc. Building for gnu keeps the sanitizer working.
      - name: Fuzz ${{ matrix.target }}
        run: cargo +nightly fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -max_total_time=120 -print_final_stats=1
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
