name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all features, deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Test (all features)
        run: cargo test --workspace --all-features

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Build docs (deny warnings)
        run: cargo doc --workspace --all-features --no-deps

  book:
    name: book
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build the guide
        run: mdbook build guide

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config
      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # Line-coverage floor — a ratchet that fails the build if coverage drops
      # below it (currently ~79%). Raise it as coverage improves; live-infra
      # paths are exercised separately by the `integration` job.
      - name: Coverage (line floor)
        run: cargo llvm-cov --workspace --all-features --summary-only --fail-under-lines 75

  msrv:
    name: msrv (1.95)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config
      # The repo's rust-toolchain.toml pins `stable`; drop it so the MSRV
      # toolchain is actually used for this job.
      - name: Drop toolchain override
        run: rm -f rust-toolchain.toml
      - name: Install Rust 1.95.0
        run: rustup toolchain install 1.95.0 --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: Check on MSRV
        run: cargo +1.95.0 check --workspace --all-features --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      # Install a prebuilt cargo-deny from its GitHub release (no Docker Hub
      # dependency, unlike the Docker-based cargo-deny-action).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo-deny (advisories, licenses, bans, sources)
        run: cargo deny check

  osv:
    name: osv-scanner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: osv-scanner
      # OSV aggregates GHSA + RustSec, so it catches GHSA-only advisories that
      # cargo-deny (RustSec DB) misses — e.g. the jsonwebtoken type-confusion
      # advisory that was published to GHSA before RustSec mirrored it.
      - name: Scan dependencies (OSV)
        run: osv-scanner scan source --lockfile=Cargo.lock

  feature-check:
    name: feature-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - uses: Swatinem/rust-cache@v2
      # Build every crate under each feature in isolation (and with no / all
      # features) so a feature gate that forgets a dep can't slip through.
      - name: Check each feature
        run: cargo hack check --each-feature --no-dev-deps --workspace

  integration:
    name: integration (live infra)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Spin up the backends the `#[ignore]`d live tests need, so the data-layer
    # and health-check paths are actually exercised — not just compiled.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: klauthed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_URL: postgres://postgres:postgres@localhost:5432/klauthed_test
      REDIS_URL: redis://localhost:6379/
      MONGODB_URL: mongodb://localhost:27017
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      # `--ignored` runs only the live-infra tests; the regular `test` job
      # already covers everything else. `--tests` restricts this to test targets
      # (the `#[ignore]`d live-infra tests live there) and excludes doctests —
      # otherwise `--ignored` also tries to *compile* `ignore`-fenced doctests,
      # which are illustrative and not meant to build.
      - name: Run ignored integration tests (live infra)
        run: cargo test --workspace --all-features --tests -- --ignored
